<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ரூபாய் கணக்கு</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;display:flex;justify-content:center;padding:20px}
.container{width:100%;max-width:420px;background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,.15)}
h2{text-align:center;color:#1565c0;margin-bottom:20px}
.row{display:grid;grid-template-columns:70px 1fr 90px;gap:10px;align-items:center;margin-bottom:12px}
.label{font-weight:bold}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;text-align:center;font-size:16px}
.amount{text-align:right;font-weight:bold;color:#2e7d32}
.total{margin-top:20px;background:#1565c0;color:#fff;padding:15px;border-radius:10px;text-align:center}
.total h1{font-size:30px;margin-top:8px}
</style>
</head>
<body>
<div class="container">
<h2>💰 ரூபாய் கணக்கு</h2>

<div class="row"><div class="label">₹500</div><input type="number" id="n500" oninput="calc()" placeholder="0"><div class="amount">₹<span id="a500">0</span></div></div>
<div class="row"><div class="label">₹200</div><input type="number" id="n200" oninput="calc()" placeholder="0"><div class="amount">₹<span id="a200">0</span></div></div>
<div class="row"><div class="label">₹100</div><input type="number" id="n100" oninput="calc()" placeholder="0"><div class="amount">₹<span id="a100">0</span></div></div>
<div class="row"><div class="label">₹50</div><input type="number" id="n50" oninput="calc()" placeholder="0"><div class="amount">₹<span id="a50">0</span></div></div>
<div class="row"><div class="label">₹20</div><input type="number" id="n20" oninput="calc()" placeholder="0"><div class="amount">₹<span id="a20">0</span></div></div>
<div class="row"><div class="label">₹10</div><input type="number" id="n10" oninput="calc()" placeholder="0"><div class="amount">₹<span id="a10">0</span></div></div>

<div class="total">
<div>மொத்த ரூபாய் கணக்கு</div>
<h1>₹ <span id="total">0</span></h1>
</div>
</div>

<script>
function calc(){
 const vals={
500:Number(document.getElementById('n500').value)||0,
200:Number(document.getElementById('n200').value)||0,
100:Number(document.getElementById('n100').value)||0,
50:Number(document.getElementById('n50').value)||0,
20:Number(document.getElementById('n20').value)||0,
10:Number(document.getElementById('n10').value)||0
 };
 let total=0;
 for(const note of [500,200,100,50,20,10]){
   const amt=vals[note]*note;
   document.getElementById('a'+note).textContent=amt.toLocaleString();
   total+=amt;
 }
 document.getElementById('total').textContent=total.toLocaleString();
}
</script>
</body>
</html>
